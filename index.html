<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>🫧 비눗방울 놀이 🫧</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

overflow:hidden;

width:100vw;

height:100vh;

touch-action:none;

background:

linear-gradient(
180deg,
#aee3ff,
#eafaff
);

position:relative;

}

/* 안내문 */

.guide{

position:absolute;

top:20px;

width:100%;

text-align:center;

font-size:28px;

color:white;

text-shadow:
0 2px 10px rgba(0,0,0,.15);

}

/* 무지개 */

#rainbow{

position:absolute;

top:70px;

left:50%;

transform:
translateX(-50%);

font-size:120px;

opacity:0;

transition:1s;

}

.show{

opacity:1!important;

}

/* 비눗방울 */

.bubble{

position:absolute;

border-radius:50%;

cursor:pointer;

background:

radial-gradient(

circle at 30% 30%,

rgba(
255,
255,
255,
0.95
),

rgba(
255,
255,
255,
0.18
)

);

box-shadow:

inset
-10px
-10px
18px
rgba(
255,
255,
255,
0.7),

0
0
25px
rgba(
255,
255,
255,
0.8);

animation:

float 8s linear;

}

/* 떠오르기 */

@keyframes float{

to{

transform:
translateY(
-120vh
);

}

}

/* 팡 */

.pop{

animation:

pop .2s forwards;

}

@keyframes pop{

to{

transform:
scale(
1.7
);

opacity:0;

}

}

/* 반짝 */

.spark{

position:absolute;

font-size:40px;

animation:

spark .6s forwards;

}

@keyframes spark{

to{

transform:
translateY(
-50px
);

opacity:0;

}

}

</style>

</head>

<body>

<div class="guide">

🫧 화면을 눌러 비눗방울을 만들어 보세요 🫧

</div>

<div id="rainbow">

🌈

</div>

<script>

let score=0;

/* 소리 */

function playPop(){

const ctx=

new(
window.AudioContext||

window.webkitAudioContext

)();

const osc=

ctx.createOscillator();

const gain=

ctx.createGain();

osc.frequency.value=850;

gain.gain.value=.03;

osc.connect(
gain
);

gain.connect(
ctx.destination
);

osc.start();

osc.stop(
ctx.currentTime+
0.08

);

}

/* 생성 */

function makeBubble(
x,
y
){

const bubble=

document.createElement(
"div"
);

bubble.className=
"bubble";

const size=

60+
Math.random()*80;

bubble.style.width=
size+"px";

bubble.style.height=
size+"px";

bubble.style.left=
(
x-
size/2
)
+"px";

bubble.style.top=
(
y-
size/2
)
+"px";

/* 터짐 */

bubble.addEventListener(

"pointerdown",

function(e){

e.stopPropagation();

playPop();

bubble.classList.add(
"pop"
);

score++;

const spark=

document.createElement(
"div"
);

spark.className=
"spark";

spark.innerHTML=
"✨";

spark.style.left=
x+"px";

spark.style.top=
y+"px";

document.body.append(
spark
);

setTimeout(

()=>spark.remove(),

500

);

if(
score>=15
){

document

.getElementById(
"rainbow"
)

.classList

.add(
"show"
);

}

setTimeout(

()=>bubble.remove(),

180

);

}

);

document.body.append(
bubble

);

}

/* 터치 생성 */

document.addEventListener(

"pointerdown",

e=>{

if(
e.target.classList.contains(
"bubble"
)
)
return;

makeBubble(

e.clientX,

e.clientY

);

}

);

/* 자동 생성 */

setInterval(

()=>{

makeBubble(

Math.random()

*
innerWidth,

innerHeight

);

},

1400

);

</script>

</body>

</html>
