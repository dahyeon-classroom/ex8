<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>비의 다양한 모습</title>

<style>

html,body{
margin:0;
height:100%;
overflow:hidden;
touch-action:none;

background:
linear-gradient(
180deg,
#4f6170,
#7f93a5,
#b7c3ce
);

}

canvas{
display:block;
}

#label{

position:fixed;

left:50%;
top:50%;

transform:
translate(-50%,-50%);

font-size:34px;

font-weight:700;

color:white;

white-space:nowrap;

text-shadow:
0 0 18px black;

pointer-events:none;

z-index:10;

}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div id="label">
☁️ 화면을 터치해보세요 ☁️
</div>

<script>

const canvas=
document.getElementById(
"canvas"
);

const ctx=
canvas.getContext(
"2d"
);

function resize(){

canvas.width=
innerWidth;

canvas.height=
innerHeight;

}

resize();

addEventListener(
"resize",
resize
);

const label=
document.getElementById(
"label"
);

function show(text){

label.innerHTML=
text;

clearTimeout(
window.msg
);

window.msg=
setTimeout(()=>{

label.innerHTML=
"☁️ 화면을 터치해보세요 ☁️"

},3500);

}

class Drop{

constructor(
speed,
size
){

this.speed=
speed;

this.size=
size;

this.reset();

}

reset(){

this.x=
Math.random()
*canvas.width;

this.y=
Math.random()
*-canvas.height;

this.len=
20+
Math.random()*40;

}

draw(){

ctx.beginPath();

ctx.strokeStyle=
"rgba(240,248,255,.75)";

ctx.lineWidth=
this.size;

ctx.moveTo(
this.x,
this.y
);

ctx.lineTo(
this.x,
this.y+
this.len
);

ctx.stroke();

}

update(){

this.y+=
this.speed;

if(
this.y>
canvas.height
){

this.reset();

}

this.draw();

}

}

let rain=[];

function makeRain(
count,
speed,
size
){

rain=[];

for(
let i=0;
i<count;
i++
){

rain.push(
new Drop(
speed,
size
)
);

}

}

function drawClouds(){

ctx.fillStyle=
"rgba(255,255,255,.22)";

for(
let x=0;
x<canvas.width;
x+=180
){

ctx.beginPath();

ctx.arc(
x,
80,
55,
0,
7
);

ctx.arc(
x+60,
65,
65,
0,
7
);

ctx.arc(
x+120,
80,
55,
0,
7
);

ctx.fill();

}

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

drawClouds();

rain.forEach(
v=>
v.update()
);

requestAnimationFrame(
animate
);

}

animate();

const audio=
new AudioContext();

let playing;

function stopSound(){

if(
playing
){

playing.stop();

}

}

function rainSound(
volume
){

stopSound();

const buffer=
audio.createBuffer(
1,
audio.sampleRate*4,
audio.sampleRate
);

const data=
buffer.getChannelData(
0
);

for(
let i=0;
i<data.length;
i++
){

data[i]=
(
Math.random()*2-1
)
*volume;

}

const source=
audio.createBufferSource();

source.buffer=
buffer;

const low=
audio.createBiquadFilter();

low.type=
"lowpass";

low.frequency.value=
1500;

source.connect(
low
);

low.connect(
audio.destination
);

source.start();

playing=
source;

}

function thunder(){

document.body.style.filter=
"brightness(2)";

setTimeout(()=>{

document.body.style.filter=
"none";

},250);

rainSound(
0.35
);

}

function play(type){

if(type==="투두둑"){

makeRain(
100,
8,
3
);

rainSound(
0.04
);

show(
"🌧️ 투두둑 🌧️"
);

}

if(type==="부슬부슬"){

makeRain(
220,
2,
1
);

rainSound(
0.02
);

show(
"🌦️ 부슬부슬 🌦️"
);

}

if(type==="주륵주륵"){

makeRain(
130,
16,
4
);

rainSound(
0.08
);

show(
"💧 주륵주륵 💧"
);

}

if(type==="쏴아"){

makeRain(
800,
26,
2
);

rainSound(
0.18
);

show(
"🌧️ 쏴아 🌧️"
);

}

if(type==="우르르쾅쾅"){

makeRain(
1200,
30,
3
);

thunder();

show(
"⚡ 우르르쾅쾅 ⚡"
);

}

}

let startX;

let startY;

let hold;

let taps=[];

addEventListener(

"pointerdown",

e=>{

startX=
e.clientX;

startY=
e.clientY;

hold=
setTimeout(
()=>{

play(
"쏴아"
);

},
800
);

taps.push(
Date.now()
);

taps=
taps.filter(
v=>
Date.now()-v
<1500
);

if(
taps.length===2
){

play(
"투두둑"
);

}

if(
taps.length>=5
){

play(
"우르르쾅쾅"
);

}

}

);

addEventListener(

"pointermove",

e=>{

const dx=
e.clientX-
startX;

const dy=
e.clientY-
startY;

if(
dx>180
){

clearTimeout(
hold
);

play(
"🌦️ 부슬부슬 🌦️"
);

play(
"부슬부슬"
);

}

if(
dy>180
){

clearTimeout(
hold
);

play(
"주륵주륵"
);

}

}

);

addEventListener(

"pointerup",

()=>{

clearTimeout(
hold
);

}

);

</script>

</body>
</html>
